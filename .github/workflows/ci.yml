name: CI (Test & Lint)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Lint with Ruff
        run: |
          cd backend
          python -m pip install ruff
          ruff check .
          
      - name: Run Tests with Pytest
        run: |
          cd backend
          # Mock database since we are running unit tests
          export DATABASE_URL=sqlite+aiosqlite:///unittest.db
          # We need to install pytest-asyncio to handle @pytest.mark.asyncio
          pip install pytest-asyncio aiosqlite
          python -m pytest tests/test_knx_daemon.py tests/test_api.py tests/test_parsers.py
          
  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
          
      - name: Install dependencies
        run: |
          cd frontend
          npm install
          
      - name: Lint
        run: |
          cd frontend
          npm run lint
          
      - name: Build
        run: |
          cd frontend
          npm run build
