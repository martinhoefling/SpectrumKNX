name: Build and Publish HA Add-on

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # Explicit lowercase image name (must match config.yaml `image:` field)
  IMAGE_BASE: ghcr.io/martinhoefling/spectrum-knx-addon

jobs:
  build-and-push-addon:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, aarch64]
        include:
          - arch: amd64
            ha_arch: amd64
            base_image: "ghcr.io/hassio-addons/debian-base/amd64:7.3.3"
            platforms: linux/amd64
          - arch: aarch64
            ha_arch: aarch64
            base_image: "ghcr.io/hassio-addons/debian-base/aarch64:7.3.3"
            platforms: linux/arm64

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read Add-on version from config.yaml
        id: addon_version
        run: |
          VERSION=$(grep '^version:' ha-addon/config.yaml | sed 's/version: *"\(.*\)"/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Add-on version: $VERSION"

      - name: Set up QEMU
        if: matrix.arch == 'aarch64'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ha-addon/Dockerfile
          platforms: ${{ matrix.platforms }}
          build-args: |
            BUILD_FROM=${{ matrix.base_image }}
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}-${{ matrix.ha_arch }}:${{ steps.addon_version.outputs.version }}
            ${{ env.IMAGE_BASE }}-${{ matrix.ha_arch }}:latest
