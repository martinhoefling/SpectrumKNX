name: "Spectrum KNX"
description: "A professional KNX bus monitor and analyzer"
version: "1.0.1"
slug: "spectrum_knx"
image: "ghcr.io/martinhoefling/spectrum-knx-addon-{arch}"
init: false
arch:
  - aarch64
  - amd64
ingress: true
ingress_port: 8000
ingress_stream: true
panel_icon: mdi:knx
panel_title: "Spectrum KNX"
panel_admin: true
options:
  KNX_GATEWAY_IP: "AUTO"
  KNX_GATEWAY_PORT: 3671
  LOG_LEVEL: "INFO"
schema:
  KNX_GATEWAY_IP: "str"
  KNX_GATEWAY_PORT: "port"
  LOG_LEVEL: "match(DEBUG|INFO|WARNING|ERROR|CRITICAL)"
ports:
  "5432/tcp": null
ports_description:
  "5432/tcp": "PostgreSQL TimescaleDB (optional for external tools like Grafana)"
